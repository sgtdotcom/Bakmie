script: |
  set -e

  echo "📁 Masuk ke folder project..."
  cd /home/ubuntu/bakmie-pos

  echo "⬇️ Pull kode terbaru dari GitHub..."
  git pull origin main || git pull origin master

  echo "📦 Install dependencies..."
  npm install

  echo "🧬 Prisma generate..."
  npx prisma generate

  echo "🏗️ Build aplikasi..."
  npm run build

  echo "♻️ Restart PM2..."
  pm2 restart bakmie || pm2 start npm --name "bakmie" -- start

  echo "💾 Save PM2..."
  pm2 save

  echo "✅ Deploy selesai!"

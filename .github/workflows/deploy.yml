name: 🚀 Deploy Bakmie POS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy ke VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd /home/ubuntu/bakmie-pos
            git pull origin main
            npm install
            npx prisma generate
            npm run build
            pm2 restart bakmie || pm2 start npm --name bakmie -- start
            pm2 save